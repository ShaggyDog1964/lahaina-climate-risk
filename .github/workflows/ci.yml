name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: |
          uv pip install --system -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check src/

      - name: Run core tests
        run: |
          python -m pytest tests/ \
            --ignore=tests/properties \
            --ignore=tests/adversarial \
            --ignore=tests/numerical_validation \
            --ignore=tests/benchmarks \
            --ignore=tests/integration \
            -q --tb=short --timeout=120

      - name: Run property + adversarial tests
        run: |
          python -m pytest tests/properties tests/adversarial tests/numerical_validation \
            -q --tb=short --timeout=300

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install uv
        run: pip install uv
      - name: Install dev deps
        run: uv pip install --system ruff mypy pandas-stubs types-requests
      - name: Ruff check
        run: ruff check src/
      - name: Mypy check (non-strict)
        run: mypy src/ --ignore-missing-imports || true
